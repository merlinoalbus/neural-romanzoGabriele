name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - name: Install backend dependencies
        run: npm ci --prefix server
      - name: Typecheck backend
        run: npm run typecheck --prefix server

  verify-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci --prefix frontend
      - name: Build frontend
        run: npm run build --prefix frontend

  verify-mcp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: mcp-server/package-lock.json
      - name: Install MCP dependencies
        run: npm ci --prefix mcp-server
      - name: Typecheck MCP
        run: npm run typecheck --prefix mcp-server
      - name: Lint MCP
        run: npm run lint --prefix mcp-server
      - name: Test MCP
        run: npm test --prefix mcp-server
