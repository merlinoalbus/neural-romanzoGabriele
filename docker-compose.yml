services:
  romanzo_gabriele_be:
    image: ghcr.io/merlinoalbus/romanzo-gabriele-neural-backend:latest
    container_name: romanzo_gabriele_be
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      - PORT=3001
      - PROJECT_ID=${PROJECT_ID:-romanzo-gabriele}
      - PROJECT_BASE_PATH=/data
      - APP_ENV=${APP_ENV:-production}
      - APP_VERSION=${APP_VERSION:-0.1.0}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - MCP_SHARED_SECRET=${MCP_SHARED_SECRET:-}
      - NEO4J_URI=bolt://romanzo_gabriele_neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set in the stack environment}
    depends_on:
      romanzo_gabriele_neo4j:
        condition: service_healthy
    volumes:
      - "${NAS_PROJECT_PATH:?NAS_PROJECT_PATH must be set}:/data"
    user: "1000:1000"
    networks:
      - romanzo_gabriele_network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.scope=${WATCHTOWER_SCOPE:-romanzo-gabriele-neural}"

  romanzo_gabriele_fe:
    image: ghcr.io/merlinoalbus/romanzo-gabriele-neural-frontend:latest
    container_name: romanzo_gabriele_fe
    restart: unless-stopped
    ports:
      - "${FE_HOST_PORT:-3000}:80"
    depends_on:
      romanzo_gabriele_be:
        condition: service_healthy
    networks:
      - romanzo_gabriele_network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.scope=${WATCHTOWER_SCOPE:-romanzo-gabriele-neural}"

  romanzo_gabriele_mcp:
    image: ghcr.io/merlinoalbus/romanzo-gabriele-neural-mcp:latest
    container_name: romanzo_gabriele_mcp
    restart: unless-stopped
    ports:
      - "${MCP_HOST_PORT:-3002}:3002"
    environment:
      - PROJECT_ID=${PROJECT_ID:-romanzo-gabriele}
      - APP_ENV=${APP_ENV:-production}
      - APP_VERSION=${APP_VERSION:-0.1.0}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - MCP_PORT=3002
      - MCP_SHARED_SECRET=${MCP_SHARED_SECRET:-}
      - MCP_SSE_KEEPALIVE_MS=${MCP_SSE_KEEPALIVE_MS:-25000}
      - MCP_SESSION_TTL_MS=${MCP_SESSION_TTL_MS:-1800000}
      - MCP_SESSION_CLEANUP_INTERVAL_MS=${MCP_SESSION_CLEANUP_INTERVAL_MS:-300000}
      - MCP_INSTRUCTIONS_PATH=${MCP_INSTRUCTIONS_PATH:-./instructions.md}
      - BACKEND_URL=http://romanzo_gabriele_be:3001
      - PROJECT_BASE_PATH=/data
      - NEO4J_URI=bolt://romanzo_gabriele_neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set in the stack environment}
    depends_on:
      romanzo_gabriele_be:
        condition: service_healthy
      romanzo_gabriele_neo4j:
        condition: service_healthy
    volumes:
      - "${NAS_PROJECT_PATH:?NAS_PROJECT_PATH must be set}:/data:ro"
    user: "1000:1000"
    networks:
      - romanzo_gabriele_network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.scope=${WATCHTOWER_SCOPE:-romanzo-gabriele-neural}"

  romanzo_gabriele_neo4j:
    image: neo4j:5-community
    container_name: romanzo_gabriele_neo4j
    restart: unless-stopped
    ports:
      - "7687:7687"
      - "7474:7474"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set in the stack environment}
      - HEALTHCHECK_PASSWORD=${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set in the stack environment}
      - NEO4J_dbms_security_auth__minimum__password__length=16
      - NEO4J_server_memory_heap_initial__size=1G
      - NEO4J_server_memory_heap_max__size=1G
      - NEO4J_server_memory_pagecache_size=1G
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -a bolt://127.0.0.1:7687 -u neo4j -p \"$${HEALTHCHECK_PASSWORD}\" \"RETURN 1\" >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
    volumes:
      - "romanzo_gabriele_neo4j_data:/data"
    networks:
      - romanzo_gabriele_network

  watchtower:
    image: containrrr/watchtower:latest
    container_name: romanzo_gabriele_watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOCKER_API_VERSION=${DOCKER_API_VERSION:-1.40}
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=120
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_INCLUDE_RESTARTING=true
      - WATCHTOWER_SCOPE=${WATCHTOWER_SCOPE:-romanzo-gabriele-neural}
    labels:
      - "com.centurylinklabs.watchtower.scope=${WATCHTOWER_SCOPE:-romanzo-gabriele-neural}"
    networks:
      - romanzo_gabriele_network

networks:
  romanzo_gabriele_network:
    driver: bridge

volumes:
  romanzo_gabriele_neo4j_data:
